<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test A : Connexion Contextuelle (Inline)</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: '#E34400' }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } };
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FAFAFA; color: #121212; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { width: 16px; height: 16px; border: 2px solid rgba(227,68,0,0.2); border-top-color: #E34400; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-screen flex overflow-hidden">
    <div id="root" class="w-full h-full"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [status, setStatus] = useState('idle'); // idle, connecting, success

            const connectTool = () => {
                setStatus('connecting');
                setTimeout(() => setStatus('success'), 1500);
            };

            return (
                <div className="flex h-full w-full">
                    
                    {/* Fake Sidebar */}
                    <div className="w-[280px] bg-gray-50 border-r border-gray-200 p-6 flex flex-col">
                        <div className="font-bold text-xl mb-8 flex items-center gap-2"><div className="w-6 h-6 bg-brand text-white flex items-center justify-center rounded">f</div> Freescale</div>
                        <div className="text-xs font-bold text-gray-400 uppercase mb-4">Clients (CRM)</div>
                        <div className="bg-white border border-gray-200 rounded-xl p-3 flex items-center justify-between mb-2 shadow-sm">
                            <span className="font-semibold text-sm">L'Oréal Paris</span>
                            <span className="w-2 h-2 bg-brand rounded-full"></span>
                        </div>
                        <div className="p-3 flex items-center justify-between opacity-50">
                            <span className="font-medium text-sm text-gray-500">Startup XYZ</span>
                        </div>
                    </div>

                    {/* Main Content: Contextual Inbox */}
                    <div className="flex-1 flex flex-col bg-white">
                        
                        {/* Fake Header */}
                        <div className="h-16 border-b border-gray-100 flex items-center px-8 justify-between">
                            <h2 className="font-bold text-lg">L'Oréal Paris</h2>
                        </div>

                        {/* Inline Connection Banner (The AB Test focus) */}
                        <div className="flex-1 flex items-center justify-center p-8 bg-gray-50/50">
                            <div className="max-w-[480px] w-full bg-white border border-gray-200 rounded-2xl p-8 shadow-[0_4px_20px_rgba(0,0,0,0.03)] fade-in text-center">
                                
                                {status === 'idle' && (
                                    <>
                                        <div className="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center text-xl mx-auto mb-4">🔌</div>
                                        <h3 className="text-lg font-bold text-gray-900 mb-2">Connectez le canal de L'Oréal</h3>
                                        <p className="text-sm text-gray-500 mb-8 leading-relaxed">
                                            D'où proviennent vos échanges avec ce client ? L'IA a besoin de l'accès pour peupler cette boîte de réception.
                                        </p>
                                        
                                        <div className="grid grid-cols-2 gap-3">
                                            <button onClick={connectTool} className="flex flex-col items-center justify-center gap-2 p-4 border border-gray-200 hover:border-brand hover:bg-orange-50/50 rounded-xl transition-colors">
                                                <span className="text-2xl">🟣</span>
                                                <span className="text-xs font-semibold text-gray-700">Slack</span>
                                            </button>
                                            <button onClick={connectTool} className="flex flex-col items-center justify-center gap-2 p-4 border border-gray-200 hover:border-brand hover:bg-orange-50/50 rounded-xl transition-colors">
                                                <span className="text-2xl">💬</span>
                                                <span className="text-xs font-semibold text-gray-700">WhatsApp</span>
                                            </button>
                                        </div>
                                    </>
                                )}

                                {status === 'connecting' && (
                                    <div className="py-10 flex flex-col items-center justify-center fade-in">
                                        <div className="spinner mb-4"></div>
                                        <span className="text-sm font-semibold text-gray-600">Ouverture de l'intégration...</span>
                                    </div>
                                )}

                                {status === 'success' && (
                                    <div className="py-6 fade-in">
                                        <div className="w-12 h-12 bg-green-50 text-green-600 rounded-full flex items-center justify-center text-2xl mx-auto mb-4 border border-green-100">✓</div>
                                        <h3 className="text-lg font-bold text-gray-900 mb-2">Slack connecté !</h3>
                                        <p className="text-sm text-gray-500 mb-6">L'historique avec L'Oréal est en cours de synchronisation.</p>
                                        <button className="bg-gray-900 text-white text-sm font-semibold py-2.5 px-6 rounded-lg w-full">Afficher les messages</button>
                                    </div>
                                )}
                            </div>
                        </div>

                    </div>
                </div>
            )
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
