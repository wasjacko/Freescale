<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clients | Freescale</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #FFFFFF; color: #121212; overflow: hidden; }
        .layout { display: flex; height: 100vh; }
        .sidebar { width: 240px; border-right: 1px solid #E5E7EB; background: #F9FAFB; display: flex; flex-direction: column; }
        .logo { padding: 24px; font-weight: 900; font-size: 18px; display: flex; gap: 8px; align-items: center; letter-spacing: -0.3px; }
        .logo-box { width: 28px; height: 28px; background: #E34400; color: white; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 14px; }
        .nav { padding: 0 12px; }
        .nav-item { padding: 10px 12px; border-radius: 10px; font-weight: 700; color: #6B7280; font-size: 14px; cursor: pointer; display: flex; gap: 10px; align-items: center; margin-bottom: 4px; transition: all 0.15s; text-decoration: none; }
        .nav-item:hover { color: #121212; }
        .nav-item.active { background: rgba(227,68,0,0.06); color: #E34400; }
        .nav-item svg { width: 16px; height: 16px; }
        .main { flex: 1; display: flex; flex-direction: column; padding: 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .title { font-size: 24px; font-weight: 900; letter-spacing: -0.5px; }
        .btn-add { background: #121212; color: white; padding: 10px 20px; border-radius: 10px; font-weight: 700; border: none; cursor: pointer; }
        .table-card { border: 1px solid #E5E7EB; border-radius: 16px; overflow: hidden; background: white; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 16px 20px; background: #F9FAFB; font-size: 12px; font-weight: 800; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.1em; }
        td { padding: 16px 20px; border-top: 1px solid #E5E7EB; font-size: 14px; font-weight: 500; }
        .status { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 800; }
        .status-on { background: #F0FDF4; color: #10B981; }
        .status-off { background: #FEF2F2; color: #EF4444; }
        .task-count { display: inline-flex; align-items: center; gap: 6px; background: #FFF8F5; color: #E34400; padding: 4px 8px; border-radius: 6px; font-weight: 800; font-size: 11px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const ClientsView = () => (
            <div className="layout">
                <aside className="sidebar">
                    <div className="logo"><div className="logo-box">f</div> Freescale</div>
                    <nav className="nav">
                        <a href="/dashboard.html" className="nav-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path></svg>
                            Boîte de Réception
                        </a>
                        <a href="/clients.html" className="nav-item active">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                            CRM & Clients
                        </a>
                    </nav>
                </aside>
                <main className="main">
                    <header className="header">
                        <h1 className="title">Gestion des Clients</h1>
                        <button className="btn-add">+ Nouveau Client</button>
                    </header>
                    <div className="table-card">
                        <table>
                            <thead>
                                <tr>
                                    <th>Client</th>
                                    <th>Statut</th>
                                    <th>Tâches IA</th>
                                    <th>Dernière Synchro</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><strong>Thomas Martin</strong><br/><small style={{color:'#6B7280'}}>TechFlow SDK</small></td>
                                    <td><span className="status status-on">Actif</span></td>
                                    <td><span className="task-count">✨ 3 nouvelles</span></td>
                                    <td>Aujourd'hui, 10:42</td>
                                </tr>
                                <tr>
                                    <td><strong>Sophie Lemaire</strong><br/><small style={{color:'#6B7280'}}>E-commerce</small></td>
                                    <td><span className="status status-on">Actif</span></td>
                                    <td><span className="task-count">✨ 1 nouvelle</span></td>
                                    <td>Aujourd'hui, 09:15</td>
                                </tr>
                                <tr>
                                    <td><strong>Marc (Studio D)</strong><br/><small style={{color:'#6B7280'}}>Freelance Designer</small></td>
                                    <td><span className="status status-off">En attente</span></td>
                                    <td>—</td>
                                    <td>Mardi, 11:00</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </main>
            </div>
        );
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ClientsView />);
    </script>
</body>
</html>
