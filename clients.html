        body { font-family: 'Satoshi', 'Inter', sans-serif; background: #F7F8FA; color: #121212; overflow: hidden; }

        .app { display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar {

            display: flex; flex-direction: column;
            background: white;

        }
        .logo-icon {
            width: 30px; height: 30px; background: #E34400; border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 900; font-size: 14px;
        }
        .logo-name { font-size: 16px; font-weight: 900; letter-spacing: -0.3px; }

        .nav-item.active { background: rgba(227,68,0,0.07); color: #E34400; }
        .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }

        .sidebar-footer {
            padding: 14px 16px; border-top: 1px solid rgba(0,0,0,0.05);
            display: flex; align-items: center; gap: 10px;

        .user-orb {
            width: 34px; height: 34px; border-radius: 50%;
            background: linear-gradient(135deg, #E34400, #ff6b35);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 13px; font-weight: 900; flex-shrink: 0;

        .user-name { font-size: 13px; font-weight: 800; }
        .user-role { font-size: 9px; color: #9CA3AF; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 1px; }

        /* Main */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

        .top-bar {
            height: 58px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 28px;
            background: white; border-bottom: 1px solid rgba(0,0,0,0.06);

        .top-title { font-size: 18px; font-weight: 900; letter-spacing: -0.3px; }
        .top-actions { display: flex; align-items: center; gap: 10px; }

            padding: 9px 16px; background: #E34400; color: white;
            font-size: 12px; font-weight: 900; border: none; border-radius: 10px;
            cursor: pointer; letter-spacing: 0.02em; transition: all 0.15s;
        }
        .btn-new:hover { opacity: 0.9; transform: translateY(-1px); }
        .search-box {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 14px; background: #F3F4F6; border-radius: 10px;
            font-size: 12px; font-weight: 600; color: #9CA3AF;
        }

        /* Tab bar */
        .tab-bar {
            display: flex; gap: 2px;
            padding: 12px 28px 0; background: white;
            border-bottom: 1px solid rgba(0,0,0,0.06); flex-shrink: 0;
        }
        .tab {
            padding: 8px 16px; font-size: 12px; font-weight: 800;
            color: #9CA3AF; cursor: pointer; border-bottom: 2px solid transparent;
            transition: all 0.15s; margin-bottom: -1px;
        }
        .tab:hover { color: #374151; }
        .tab.active { color: #E34400; border-bottom-color: #E34400; }

        /* Content */
        .content { flex: 1; overflow-y: auto; padding: 24px 28px; }
        .content::-webkit-scrollbar { width: 4px; }
        .content::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 99px; }

        /* Stats row */
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
        .stat-card {
            background: white; border-radius: 16px; padding: 18px 20px;
            border: 1px solid rgba(0,0,0,0.06);

        .stat-value { font-size: 28px; font-weight: 900; letter-spacing: -1px; line-height: 1; margin-bottom: 4px; }
        .stat-delta { font-size: 11px; font-weight: 700; }
        .delta-pos { color: #16A34A; }
        .delta-neg { color: #E34400; }

        /* Client grid */
        .clients-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

        .client-card {
            background: white; border-radius: 20px;
            border: 1px solid rgba(0,0,0,0.06);
            padding: 22px; cursor: pointer;
            transition: all 0.2s; position: relative; overflow: hidden;
        }
        .client-card:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.08); transform: translateY(-2px); }
        .client-card .accent-bar {
            position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
        }

        .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
        .card-avatar-name { display: flex; align-items: center; gap: 12px; }
        .client-avatar {
            width: 42px; height: 42px; border-radius: 50%;
            font-size: 16px; font-weight: 900; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; color: white;
        }
        .client-name { font-size: 15px; font-weight: 900; letter-spacing: -0.2px; }
        .client-sector { font-size: 11px; color: #9CA3AF; font-weight: 600; margin-top: 2px; }

        .health-badge {
            padding: 4px 10px; border-radius: 99px;
            font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.06em;
        }
        .h-critical { background: rgba(239,68,68,0.1); color: #DC2626; }
        .h-good { background: rgba(34,197,94,0.1); color: #16A34A; }
        .h-medium { background: rgba(245,158,11,0.1); color: #D97706; }

        .card-metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .metric { text-align: center; }
        .metric-val { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; }
        .metric-lbl { font-size: 9px; font-weight: 800; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

        .card-divider { height: 1px; background: #F3F4F6; margin-bottom: 14px; }

        .card-tasks { display: flex; flex-direction: column; gap: 6px; }
        .task-row {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 10px; background: #F9FAFB; border-radius: 10px;

        .task-text { font-size: 12px; font-weight: 700; flex: 1; color: #374151; }
        .task-due { font-size: 10px; font-weight: 700; color: #9CA3AF; white-space: nowrap; }
        .task-due.urgent { color: #E34400; }

        .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; }
        .platform-dots { display: flex; gap: 5px; }
        .plat-dot { width: 20px; height: 20px; border-radius: 99px; display: flex; align-items: center; justify-content: center; font-size: 10px; border: 1px solid rgba(0,0,0,0.06); }
        .last-activity { font-size: 10px; color: #9CA3AF; font-weight: 600; }
        .open-btn {
            padding: 6px 12px; background: #F3F4F6; border: none; border-radius: 8px;
            font-size: 10px; font-weight: 900; color: #374151; cursor: pointer; transition: all 0.15s;
        }
        .open-btn:hover { background: #E34400; color: white; }

        /* Project detail panel */
        .detail-panel {
            width: 380px; min-width: 380px;
            background: white; border-left: 1px solid rgba(0,0,0,0.06);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .detail-header { padding: 22px 24px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .detail-avatar-row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
        .detail-avatar { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; color: white; }
        .detail-name { font-size: 18px; font-weight: 900; letter-spacing: -0.3px; }
        .detail-sector { font-size: 12px; color: #9CA3AF; font-weight: 600; margin-top: 2px; }

        .detail-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .ds { background: #F9FAFB; border-radius: 12px; padding: 10px; text-align: center; border: 1px solid rgba(0,0,0,0.04); }
        .ds-val { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
        .ds-lbl { font-size: 9px; font-weight: 800; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

        .detail-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
        .detail-body::-webkit-scrollbar { width: 3px; }
        .detail-body::-webkit-scrollbar-thumb { background: #F3F4F6; border-radius: 99px; }

        .section-heading { font-size: 10px; font-weight: 900; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; margin-top: 20px; }
        .section-heading:first-child { margin-top: 0; }

        .timeline-item { display: flex; gap: 12px; margin-bottom: 14px; }
        .tl-left { display: flex; flex-direction: column; align-items: center; }
        .tl-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
        .tl-line { width: 1px; background: #F3F4F6; flex: 1; margin-top: 4px; }
        .tl-content { padding-bottom: 14px; }
        .tl-title { font-size: 13px; font-weight: 800; margin-bottom: 2px; }
        .tl-sub { font-size: 11px; color: #9CA3AF; font-weight: 500; }

        .detail-tasks { display: flex; flex-direction: column; gap: 8px; }
        .dt { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #F9FAFB; border-radius: 12px; border: 1px solid rgba(0,0,0,0.04); }
        .dt-check { width: 18px; height: 18px; border-radius: 5px; border: 2px solid #E5E7EB; flex-shrink: 0; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
        .dt-check:hover { border-color: #E34400; }
        .dt-check.done { background: #E34400; border-color: #E34400; }
        .dt-text { font-size: 12px; font-weight: 700; flex: 1; color: #374151; }
        .dt-due { font-size: 10px; font-weight: 700; color: #9CA3AF; white-space: nowrap; }
        .dt-due.hot { color: #E34400; }

        .chat-preview-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #F9FAFB; border-radius: 12px; margin-bottom: 8px; border: 1px solid rgba(0,0,0,0.04); }
        .cp-plat { width: 26px; height: 26px; border-radius: 99px; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
        .cp-text { font-size: 12px; font-weight: 600; color: #374151; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cp-time { font-size: 10px; color: #9CA3AF; font-weight: 600; white-space: nowrap; }
    </style>
</head>

const App = () => {
    const [tab, setTab] = useState('all');
    const [selected, setSelected] = useState(clients[0]);

    const filtered = tab === 'all' ? clients : tab === 'active' ? clients.filter(c => c.health !== 'good' || c.tasks > 0) : clients.filter(c => c.health === 'critical');

    return (
        <div className="app">
            <SidebarNav />

            <div className="main">
                {/* Top bar */}
                <div className="top-bar">
                    <span className="top-title">Projets & Clients</span>
                </div>


                {/* Content */}
                <div className="content">
                    {/* Stats */}
                    <div className="stats-row">
                        {[
                            { label: 'Clients actifs', value: '4', delta: '+1 ce mois', pos: true },
                            { label: 'En cours', value: '5 140€', delta: '+890€', pos: true },
                            { label: 'Tâches détectées', value: '10', delta: '3 urgentes', pos: false },
                        ].map((s, i) => (
                            <div key={i} className="stat-card">
                                <div className="stat-label">{s.label}</div>
                                <div className="stat-value">{s.value}</div>
                                <div className={`stat-delta ${s.pos ? 'delta-pos' : 'delta-neg'}`}>{s.delta}</div>
                            </div>
                        ))}
                    </div>

                    {/* Client cards */}
                    <div className="clients-grid">
                        {filtered.map(client => (
                            <div key={client.id} className="client-card" onClick={() => setSelected(client)}>
                                <div className="accent-bar" style={{ background: client.accentColor }} />

                                <div className="card-top">
                                    <div className="card-avatar-name">
                                        <div className="client-avatar" style={{ background: client.color }}>{client.initials}</div>
                                        <div>
                                            <div className="client-name">{client.name}</div>
                                            <div className="client-sector">{client.sector}</div>
                                        </div>
                                    </div>
                                    <span className={`health-badge ${client.health === 'good' ? 'h-good' : client.health === 'medium' ? 'h-medium' : 'h-critical'}`}>
                                        {client.healthLabel}
                                    </span>
                                </div>

                                <div className="card-metrics">
                                    {client.metrics.map((m, i) => (
                                        <div key={i} className="metric">
                                            <div className="metric-val">{m.val}</div>
                                            <div className="metric-lbl">{m.lbl}</div>
                                        </div>
                                    ))}
                                </div>

                                <div className="card-divider" />

                                <div className="card-tasks">
                                    {client.tasks_list.slice(0, 2).map((t, i) => (
                                        <div key={i} className="task-row">
                                            <div className="task-dot" style={{ background: t.urgent ? '#E34400' : '#9CA3AF' }} />
                                            <span className="task-text">{t.text}</span>
                                            <span className={`task-due ${t.urgent ? 'urgent' : ''}`}>{t.due}</span>
                                        </div>
                                    ))}
                                    {client.tasks_list.length === 0 && (
                                        <div style={{ fontSize: 11, color: '#9CA3AF', fontWeight: 600, padding: '4px 0' }}>Aucune tâche en cours 🎉</div>
                                    )}
                                </div>

                                <div className="card-footer">
                                    <div className="platform-dots">
                                        {client.platforms.map((p, i) => (
                                            <div key={i} className="plat-dot">{p}</div>
                                        ))}
                                    </div>
                                    <span className="last-activity">{client.lastSeen}</span>
                                    <button className="open-btn" onClick={e => { e.stopPropagation(); setSelected(client); }}>Voir →</button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </div>

            {/* Detail panel */}
            <DetailPanel client={selected} onClose={() => setSelected(null)} />
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
