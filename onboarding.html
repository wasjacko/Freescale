<!DOCTYPE html>
<html lang="fr">
<head>
  <!-- Google tag (gtag.js) -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte | Freescale Copilot</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Add Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#E34400',
                            dark: '#121212',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F9FAFB;
            color: #121212;
            -webkit-font-smoothing: antialiased;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(227,68,0,0.1);
            border-top-color: #E34400;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 bg-gray-50">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MNVZN5JS"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    
    <div id="root" class="w-full max-w-[440px]"></div>

    <script type="text/babel">
        // --- Configuration Supabase ---
        const { createClient } = window.supabase;
        const supabaseUrl = 'https://niyoruzbfvaamrcpldal.supabase.co';
        const supabaseKey = 'sb_publishable_91BPPwNnFtc93N59kfIuoQ_CcWIg3TW';
        const supabase = createClient(supabaseUrl, supabaseKey);

        const { useState } = React;

        const App = () => {
            const [step, setStep] = useState(1);
            const [tools, setTools] = useState([]);
            const [isScanning, setIsScanning] = useState(false);
            const [authError, setAuthError] = useState("");
            
            // Form state for Sign up
            const [firstName, setFirstName] = useState("");
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [userId, setUserId] = useState(null);
            
            // State for manual client entry
            const [clientInput, setClientInput] = useState("");
            const [clients, setClients] = useState([
                { id: 1, name: 'L\'Oréal (Projet Alpha)' }
            ]);

            const toggleTool = (id) => {
                setTools(prev => prev.includes(id) ? prev.filter(t => t !== id) : [...prev, id]);
            };

            const addClient = (e) => {
                e.preventDefault();
                if(clientInput.trim() !== "") {
                    setClients([...clients, { id: Date.now(), name: clientInput.trim() }]);
                    setClientInput("");
                }
            };

            const removeClient = (id) => {
                setClients(clients.filter(c => c.id !== id));
            };

            const handleSignUp = async (e) => {
                e.preventDefault();
                setAuthError("");
                
                // Call Supabase to create user
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: { data: { first_name: firstName } }
                });

                if (error) {
                    setAuthError(error.message);
                    return;
                }
                
                // Whether email confirmation is disabled or enabled, we try to proceed to next step
                if (data.user) {
                    setUserId(data.user.id);
                }
                setStep(2);
            };

            const startScan = async () => {
                setStep(4);
                setIsScanning(true);
                
                // If we have a logged-in user, insert clients to DB
                if (clients.length > 0) {
                    // Try to get current user ID if not set locally
                    const { data: { user } } = await supabase.auth.getUser();
                    const currentUserId = userId || (user ? user.id : null);
                    
                    if (currentUserId) {
                        const clientsToInsert = clients.map(c => ({
                            user_id: currentUserId,
                            name: c.name
                        }));
                        
                        const { error } = await supabase.from('clients').insert(clientsToInsert);
                        if (error) {
                            console.error("Erreur lors de la sauvegarde des clients:", error);
                        }
                    } else {
                        console.warn("Utilisateur non connecté, impossible d'insérer en base de données.");
                    }
                }

                setTimeout(() => {
                    setIsScanning(false);
                }, 1500);
            };

            return (
                <div className="w-full">
                    {/* Header Minimaliste */}
                    <div className="flex justify-center mb-8 fade-in">
                        <div className="w-10 h-10 bg-brand text-white font-bold text-xl rounded-xl flex items-center justify-center">f</div>
                    </div>

                    <div className="bg-white rounded-[24px] border border-gray-200 p-8 md:p-10 shadow-sm fade-in">
                        
                        {/* STEP 1: LOGIN (Functional Forms) */}
                        {step === 1 && (
                            <div className="fade-in">
                                <h1 className="text-[22px] font-bold text-center text-gray-900 mb-8 tracking-tight">Créez votre compte</h1>

                                {authError && (
                                    <div className="mb-4 p-3 bg-red-50 border border-red-200 text-red-600 text-sm rounded-xl">
                                        {authError}
                                    </div>
                                )}

                                <form onSubmit={handleSignUp} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1.5 ml-1">Prénom</label>
                                        <input type="text" value={firstName} onChange={e => setFirstName(e.target.value)} required placeholder="Thomas" className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-colors" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1.5 ml-1">Email professionnel</label>
                                        <input type="email" value={email} onChange={e => setEmail(e.target.value)} required placeholder="thomas@freelance.com" className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-colors" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1.5 ml-1">Mot de passe</label>
                                        <input type="password" value={password} onChange={e => setPassword(e.target.value)} required placeholder="••••••••" minLength="6" className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-colors" />
                                    </div>
                                    
                                    <button type="submit" className="w-full bg-brand text-white font-semibold py-3.5 rounded-xl hover:bg-orange-600 transition-colors mt-4 shadow-[0_4px_14px_rgba(227,68,0,0.2)]">
                                        Commencer l'essai gratuit
                                    </button>
                                    
                                    <div className="flex items-center gap-3 py-2">
                                        <div className="h-px bg-gray-200 flex-1"></div>
                                        <span className="text-[11px] text-gray-400 font-bold uppercase tracking-wider">ou</span>
                                        <div className="h-px bg-gray-200 flex-1"></div>
                                    </div>

                                    <button type="button" onClick={() => setStep(2)} className="w-full flex items-center justify-center gap-2 border border-gray-200 hover:border-gray-300 bg-white hover:bg-gray-50 text-gray-700 font-semibold py-3.5 rounded-xl transition-colors">
                                        Continuer avec Google
                                    </button>
                                </form>
                            </div>
                        )}

                        {/* STEP 2: TOOLS CONNECTION */}
                        {step === 2 && (
                            <div className="fade-in">
                                <button onClick={() => setStep(1)} className="text-gray-400 hover:text-gray-600 text-sm font-medium mb-6 flex items-center gap-1">
                                    ← Retour
                                </button>
                                <h1 className="text-[22px] font-bold text-gray-900 mb-6 tracking-tight">Connectez vos canaux</h1>

                                <div className="space-y-3 mb-8">
                                    {[
                                        { id: 'slack', name: 'Slack', sub: 'Workspaces' },
                                        { id: 'whatsapp', name: 'WhatsApp', sub: 'Personnel' },
                                        { id: 'gmail', name: 'Gmail', sub: 'Boîte pro' }
                                    ].map(tool => {
                                        const active = tools.includes(tool.id);
                                        return (
                                            <div key={tool.id} onClick={() => toggleTool(tool.id)} 
                                                 className={`flex items-center p-4 rounded-xl border-[1.5px] cursor-pointer transition-colors ${active ? 'border-brand bg-orange-50/40' : 'border-gray-200 hover:border-gray-300'}`}>
                                                
                                                <div className="flex-1">
                                                    <div className={`font-semibold text-sm ${active ? 'text-brand-dark' : 'text-gray-800'}`}>{tool.name}</div>
                                                    <div className="text-[13px] text-gray-500">{tool.sub}</div>
                                                </div>
                                                
                                                <div className={`w-5 h-5 rounded flex items-center justify-center transition-colors ${active ? 'bg-brand' : 'bg-gray-100 border border-gray-200'}`}>
                                                    {active && <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>

                                <button onClick={() => setStep(3)} disabled={tools.length === 0}
                                    className={`w-full py-4 rounded-xl font-semibold text-[15px] transition-colors ${tools.length > 0 ? 'bg-brand text-white hover:bg-orange-600 shadow-[0_4px_14px_rgba(227,68,0,0.2)]' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>
                                    Continuer
                                </button>
                            </div>
                        )}

                        {/* STEP 3: MANUAL CLIENT ENTRY */}
                        {step === 3 && (
                            <div className="fade-in">
                                <button onClick={() => setStep(2)} className="text-gray-400 hover:text-gray-600 text-sm font-medium mb-6 flex items-center gap-1">
                                    ← Retour
                                </button>
                                <h1 className="text-[22px] font-bold text-gray-900 mb-2 tracking-tight">Vos projets en cours</h1>
                                <p className="text-gray-500 text-[13px] leading-relaxed mb-6">
                                    Quels clients gérez-vous actuellement ? L'IA scannera vos canaux pour isoler spécifiquement ces projets.
                                </p>

                                <form onSubmit={addClient} className="flex gap-2 mb-6">
                                    <input 
                                        type="text" 
                                        value={clientInput} 
                                        onChange={e => setClientInput(e.target.value)} 
                                        placeholder="Nom de l'entreprise ou contact..." 
                                        className="flex-1 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand"
                                    />
                                    <button type="submit" disabled={!clientInput.trim()} className="bg-gray-900 disabled:bg-gray-300 text-white px-5 rounded-xl font-bold text-xl hover:bg-black transition-colors">
                                        +
                                    </button>
                                </form>

                                <div className="space-y-2 mb-8 max-h-[160px] overflow-y-auto pr-1">
                                    {clients.map(c => (
                                        <div key={c.id} className="fade-in flex justify-between items-center bg-gray-50 p-3.5 rounded-xl border border-gray-100">
                                            <span className="text-sm font-semibold text-gray-800">{c.name}</span>
                                            <button onClick={() => removeClient(c.id)} className="text-gray-400 hover:text-red-500 transition-colors">×</button>
                                        </div>
                                    ))}
                                    {clients.length === 0 && (
                                        <div className="text-center py-6 text-sm text-gray-400 border border-dashed border-gray-200 rounded-xl">
                                            Aucun client ajouté pour le moment.
                                        </div>
                                    )}
                                </div>

                                <button onClick={startScan} disabled={clients.length === 0}
                                    className={`w-full py-4 rounded-xl font-semibold text-[15px] transition-colors ${clients.length > 0 ? 'bg-brand text-white hover:bg-orange-600 shadow-[0_4px_14px_rgba(227,68,0,0.2)]' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>
                                    Valider et configurer mon IA
                                </button>
                            </div>
                        )}

                        {/* STEP 4: SUCCESS LOADING */}
                        {step === 4 && (
                            <div className="fade-in text-center py-2">
                                
                                {isScanning ? (
                                    <div className="flex flex-col items-center justify-center py-8">
                                        <div className="spinner mb-6"></div>
                                        <h2 className="text-xl font-bold text-gray-900 tracking-tight">Configuration de l'IA...</h2>
                                    </div>
                                ) : (
                                    <div className="fade-in">
                                        <div className="w-12 h-12 bg-green-50 text-green-600 rounded-full flex items-center justify-center text-xl mx-auto mb-5 border border-green-100">
                                            ✓
                                        </div>
                                        <h2 className="text-xl font-bold text-gray-900 mb-8 tracking-tight">Configuration terminée.</h2>

                                        <div className="bg-white border border-red-100 shadow-[0_4px_12px_rgba(239,68,68,0.05)] rounded-xl p-4 text-left mb-8 flex items-start gap-4 cursor-pointer hover:border-red-200 transition-colors">
                                            <div className="w-2 h-2 rounded-full bg-red-500 mt-1.5 flex-shrink-0"></div>
                                            <div>
                                                <div className="text-[13px] font-bold text-gray-900 mb-1">Alerte : Thomas attend vos accès.</div>
                                                <div className="text-[12px] text-gray-600 leading-relaxed">Engagement détecté sur Slack depuis vendredi concernant le nouveau projet.</div>
                                            </div>
                                        </div>

                                        <button onClick={() => window.location.href='/dashboard.html'} 
                                            className="w-full py-3.5 rounded-xl font-semibold text-[15px] bg-gray-900 text-white hover:bg-black transition-colors">
                                            Ouvrir mon tableau de bord
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                    </div>
                </div>
            )
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
