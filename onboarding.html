<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue | Freescale Copilot</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#E34400',
                            dark: '#121212',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F9FAFB;
            color: #121212;
            -webkit-font-smoothing: antialiased;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Minimal loader */
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(227,68,0,0.1);
            border-top-color: #E34400;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 bg-gray-50">
    
    <div id="root" class="w-full max-w-[440px]"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [step, setStep] = useState(1);
            const [tools, setTools] = useState([]);
            const [isScanning, setIsScanning] = useState(false);

            const toggleTool = (id) => {
                setTools(prev => prev.includes(id) ? prev.filter(t => t !== id) : [...prev, id]);
            };

            const startScan = () => {
                setStep(3);
                setIsScanning(true);
                setTimeout(() => {
                    setIsScanning(false);
                }, 2500);
            };

            return (
                <div className="w-full">
                    {/* Header Minimaliste */}
                    <div className="flex justify-center mb-8 fade-in">
                        <div className="w-10 h-10 bg-brand text-white font-bold text-xl rounded-xl flex items-center justify-center">f</div>
                    </div>

                    <div className="bg-white rounded-[24px] border border-gray-200 p-8 md:p-10 shadow-sm fade-in">
                        
                        {/* STEP 1: VALUE PROP & LOGIN */}
                        {step === 1 && (
                            <div className="fade-in">
                                <h1 className="text-[22px] font-bold text-center text-gray-900 mb-3 tracking-tight">Centralisez vos échanges clients</h1>
                                <p className="text-center text-gray-500 text-[14px] leading-relaxed mb-8">
                                    L'IA lit vos messages (Slack, mails...) et extrait automatiquement vos tâches, relances et urgences pour vous faire gagner 1 journée par semaine.
                                </p>

                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1.5 ml-1">Email</label>
                                        <input type="email" placeholder="prenom@exemple.com" className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-colors" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-gray-600 mb-1.5 ml-1">Mot de passe</label>
                                        <input type="password" placeholder="••••••••" className="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-colors" />
                                    </div>
                                    <button onClick={() => setStep(2)} className="w-full bg-brand text-white font-semibold py-3.5 rounded-xl hover:bg-orange-600 transition-colors mt-2">
                                        Créer mon compte
                                    </button>
                                    
                                    <div className="flex items-center gap-3 py-2">
                                        <div className="h-px bg-gray-200 flex-1"></div>
                                        <span className="text-[11px] text-gray-400 font-bold uppercase tracking-wider">ou</span>
                                        <div className="h-px bg-gray-200 flex-1"></div>
                                    </div>

                                    <button onClick={() => setStep(2)} className="w-full flex items-center justify-center gap-2 border border-gray-200 hover:border-gray-300 bg-white hover:bg-gray-50 text-gray-700 font-semibold py-3.5 rounded-xl transition-colors">
                                        Continuer avec Google
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* STEP 2: TOOLS CONNECTION */}
                        {step === 2 && (
                            <div className="fade-in">
                                <button onClick={() => setStep(1)} className="text-gray-400 hover:text-gray-600 text-sm font-medium mb-6 flex items-center gap-1">
                                    ← Retour
                                </button>
                                <h1 className="text-[22px] font-bold text-gray-900 mb-3 tracking-tight">D'où viennent vos messages ?</h1>
                                <p className="text-gray-500 text-[14px] leading-relaxed mb-6">
                                    Sélectionnez les canaux à analyser. L'algorithme se chargera de lire le chaos pour construire votre to-do list d'actions à mener.
                                </p>

                                <div className="space-y-3 mb-8">
                                    {[
                                        { id: 'slack', name: 'Canaux Slack', sub: 'Workspaces professionnels connectés' },
                                        { id: 'whatsapp', name: 'WhatsApp Pro', sub: 'Discussions clients directes' },
                                        { id: 'gmail', name: 'Gmail', sub: 'Boîte de messagerie principale' }
                                    ].map(tool => {
                                        const active = tools.includes(tool.id);
                                        return (
                                            <div key={tool.id} onClick={() => toggleTool(tool.id)} 
                                                 className={`flex items-center p-4 rounded-xl border-[1.5px] cursor-pointer transition-colors ${active ? 'border-brand bg-orange-50/40' : 'border-gray-200 hover:border-gray-300'}`}>
                                                
                                                <div className="flex-1">
                                                    <div className={`font-semibold text-sm ${active ? 'text-brand-dark' : 'text-gray-800'}`}>{tool.name}</div>
                                                    <div className="text-[13px] text-gray-500">{tool.sub}</div>
                                                </div>
                                                
                                                {/* Checkbox minimaliste personnalisée */}
                                                <div className={`w-5 h-5 rounded flex items-center justify-center transition-colors ${active ? 'bg-brand' : 'bg-gray-100 border border-gray-200'}`}>
                                                    {active && <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>

                                <button onClick={startScan} disabled={tools.length === 0}
                                    className={`w-full py-4 rounded-xl font-semibold text-[15px] transition-colors ${tools.length > 0 ? 'bg-brand text-white hover:bg-orange-600' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>
                                    Extraire mes tâches
                                </button>
                            </div>
                        )}

                        {/* STEP 3: SUCCESS AND INSIGHT */}
                        {step === 3 && (
                            <div className="fade-in text-center py-2">
                                
                                {isScanning ? (
                                    <div className="flex flex-col items-center justify-center fade-in py-8">
                                        <div className="spinner mb-6"></div>
                                        <h2 className="text-xl font-bold text-gray-900 mb-2 tracking-tight">Analyse en cours...</h2>
                                        <p className="text-[14px] text-gray-500 max-w-[250px] mx-auto leading-relaxed">
                                            Extraction automatique de vos urgences depuis vos conversations...
                                        </p>
                                    </div>
                                ) : (
                                    <div className="fade-in">
                                        <div className="w-12 h-12 bg-green-50 text-green-600 rounded-full flex items-center justify-center text-xl mx-auto mb-5 border border-green-100">
                                            ✓
                                        </div>
                                        <h2 className="text-xl font-bold text-gray-900 mb-2 tracking-tight">Votre To-Do List est prête.</h2>
                                        <p className="text-[14px] text-gray-500 mb-8 max-w-[280px] mx-auto leading-relaxed">
                                            Freescale a organisé l'historique de 5 clients cachés dans vos messages.
                                        </p>

                                        {/* Insight Mignon & Clean sans emoji agressif */}
                                        <div className="bg-white border border-red-100 shadow-[0_4px_12px_rgba(239,68,68,0.05)] rounded-xl p-4 text-left mb-8 flex items-start gap-4">
                                            <div className="w-2 h-2 rounded-full bg-red-500 mt-1.5 flex-shrink-0"></div>
                                            <div>
                                                <div className="text-[13px] font-bold text-gray-900 leading-tight mb-1">Thomas attend les accès Figma.</div>
                                                <div className="text-[12px] text-gray-600 leading-relaxed">Engagement détecté sur Slack depuis vendredi. L'IA a pré-rédigé votre message avec le lien.</div>
                                            </div>
                                        </div>

                                        <button onClick={() => window.location.href='/dashboard.html'} 
                                            className="w-full py-3.5 rounded-xl font-semibold text-[15px] bg-gray-900 text-white hover:bg-black transition-colors">
                                            Ouvrir mon tableau de bord
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                    </div>
                    
                    {step < 3 && (
                        <div className="mt-6 text-center">
                           <a href="/dashboard.html" className="text-sm text-gray-400 hover:text-gray-600 font-medium">Ignorer cette étape</a>
                        </div>
                    )}
                </div>
            )
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
