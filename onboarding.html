<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue | Freescale Copilot</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#E34400',
                            dark: '#121212',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F9FAFB;
            color: #121212;
            -webkit-font-smoothing: antialiased;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Minimal loader */
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(227,68,0,0.1);
            border-top-color: #E34400;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 bg-gray-50">
    
    <div id="root" class="w-full max-w-[440px]"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [step, setStep] = useState(1);
            const [tools, setTools] = useState([]);
            const [isScanning, setIsScanning] = useState(false);

            const toggleTool = (id) => {
                setTools(prev => prev.includes(id) ? prev.filter(t => t !== id) : [...prev, id]);
            };

            const startScan = () => {
                setStep(3);
                setIsScanning(true);
                // Simulate a fast, clean 2.5s scan
                setTimeout(() => {
                    setIsScanning(false);
                }, 2500);
            };

            return (
                <div className="w-full">
                    {/* Header Minimaliste */}
                    <div className="flex justify-center mb-8 fade-in">
                        <div className="w-10 h-10 bg-brand text-white font-bold text-xl rounded-xl flex items-center justify-center">f</div>
                    </div>

                    <div className="bg-white rounded-[24px] border border-gray-200 p-8 md:p-10 shadow-sm fade-in">
                        
                        {/* STEP 1: LOGIN */}
                        {step === 1 && (
                            <div className="fade-in">
                                <h1 className="text-2xl font-bold text-center text-gray-900 mb-2">Bienvenue</h1>
                                <p className="text-center text-gray-500 text-sm mb-8">Connectez-vous pour commencer.</p>

                                <div className="space-y-3">
                                    <button onClick={() => setStep(2)} className="w-full flex items-center justify-center gap-3 border border-gray-200 hover:border-gray-300 bg-white hover:bg-gray-50 text-gray-800 font-semibold py-3.5 rounded-xl transition-colors">
                                        <span className="text-lg">🔴</span> Google
                                    </button>
                                    <button onClick={() => setStep(2)} className="w-full flex items-center justify-center gap-3 border border-gray-200 hover:border-gray-300 bg-white hover:bg-gray-50 text-gray-800 font-semibold py-3.5 rounded-xl transition-colors">
                                        <span className="text-lg">🐙</span> GitHub
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* STEP 2: TOOLS SELECTION */}
                        {step === 2 && (
                            <div className="fade-in">
                                <button onClick={() => setStep(1)} className="text-gray-400 hover:text-gray-600 text-sm font-medium mb-6 flex items-center gap-1">
                                    ← Retour
                                </button>
                                <h1 className="text-2xl font-bold text-gray-900 mb-2">Connectez vos canaux</h1>
                                <p className="text-gray-500 text-sm mb-6 leading-relaxed">Freescale unifiera vos messages professionnels issus de ces plateformes.</p>

                                <div className="space-y-3 mb-8">
                                    {[
                                        { id: 'slack', name: 'Slack', icon: '🟣', sub: 'Workspaces professionnels' },
                                        { id: 'whatsapp', name: 'WhatsApp', icon: '💬', sub: 'Conversations clients' },
                                        { id: 'gmail', name: 'Gmail', icon: '✉️', sub: 'Boîte professionnelle' }
                                    ].map(tool => {
                                        const active = tools.includes(tool.id);
                                        return (
                                            <div key={tool.id} onClick={() => toggleTool(tool.id)} 
                                                 className={`flex items-center p-4 rounded-xl border-2 cursor-pointer transition-colors ${active ? 'border-brand bg-orange-50/30' : 'border-gray-100 hover:border-gray-200'}`}>
                                                <div className="text-2xl mr-4">{tool.icon}</div>
                                                <div className="flex-1">
                                                    <div className={`font-semibold text-sm ${active ? 'text-gray-900' : 'text-gray-700'}`}>{tool.name}</div>
                                                    <div className="text-xs text-gray-500">{tool.sub}</div>
                                                </div>
                                                <div className={`w-5 h-5 rounded-md border-2 flex items-center justify-center ${active ? 'bg-brand border-brand' : 'border-gray-300'}`}>
                                                    {active && <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>

                                <button onClick={startScan} disabled={tools.length === 0}
                                    className={`w-full py-4 rounded-xl font-semibold text-[15px] transition-colors ${tools.length > 0 ? 'bg-brand text-white hover:bg-orange-600' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>
                                    Continuer
                                </button>
                            </div>
                        )}

                        {/* STEP 3: SCAN & SUCCESS */}
                        {step === 3 && (
                            <div className="fade-in text-center py-4">
                                
                                {isScanning ? (
                                    <div className="flex flex-col items-center justify-center fade-in">
                                        <div className="spinner mb-6"></div>
                                        <h2 className="text-xl font-bold text-gray-900 mb-2">Synchronisation</h2>
                                        <p className="text-sm text-gray-500 max-w-[250px] mx-auto">L'IA de Freescale regroupe et structure votre historique de messages.</p>
                                    </div>
                                ) : (
                                    <div className="fade-in">
                                        <div className="w-14 h-14 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-2xl mx-auto mb-6">
                                            ✓
                                        </div>
                                        <h2 className="text-2xl font-bold text-gray-900 mb-2">Tout est prêt.</h2>
                                        <p className="text-sm text-gray-500 mb-8 max-w-[280px] mx-auto">
                                            Nous avons organisé 5 profils clients actifs depuis vos canaux.
                                        </p>

                                        {/* Insight Mignon */}
                                        <div className="bg-orange-50 border border-orange-100 rounded-xl p-4 text-left mb-8">
                                            <div className="flex items-start gap-3">
                                                <div className="text-xl mt-0.5">🚨</div>
                                                <div>
                                                    <div className="text-sm font-bold text-gray-900">Urgence détectée</div>
                                                    <div className="text-xs text-gray-600 mt-1 line-clamp-2">Thomas attend les accès Figma depuis vendredi matin sur Slack.</div>
                                                </div>
                                            </div>
                                        </div>

                                        <button onClick={() => window.location.href='/dashboard.html'} 
                                            className="w-full py-4 rounded-xl font-semibold text-[15px] bg-brand text-white hover:bg-orange-600 transition-colors">
                                            Aller au tableau de bord →
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                    </div>
                    
                    {step < 3 && (
                        <div className="mt-6 text-center">
                           <a href="/dashboard.html" className="text-sm text-gray-400 hover:text-gray-600 font-medium">Passer l'onboarding</a>
                        </div>
                    )}
                </div>
            )
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
