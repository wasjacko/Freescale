<!DOCTYPE html>
<html lang="fr" class="bg-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding | Freescale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Instrument Serif', serif; }
        .step-active { background: #E34400; width: 24px; }
        .step-inactive { background: #E5E7EB; width: 8px; }
    </style>
</head>
<body class="antialiased text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const Onboarding = () => {
            const [step, setStep] = useState(1);

            const nextStep = () => setStep(s => s + 1);

            return (
                <div class="min-h-screen flex items-center justify-center p-6 bg-[#FAFAFA]">
                    <div class="max-w-md w-full bg-white rounded-[32px] shadow-xl shadow-gray-200/50 p-10 relative overflow-hidden">
                        
                        {/* Progress */}
                        <div class="flex gap-1.5 mb-10">
                            {[1, 2, 3].map(i => (
                                <div key={i} class={`h-1.5 rounded-full transition-all duration-300 ${step >= i ? 'step-active' : 'step-inactive'}`}></div>
                            ))}
                        </div>

                        {step === 1 && (
                            <div class="animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <h1 class="text-3xl font-bold tracking-tight mb-4">Bienvenue sur <span class="text-[#E34400] font-serif italic font-normal">Freescale</span></h1>
                                <p class="text-gray-500 leading-relaxed mb-8">La plateforme qui transforme vos conversations en actions concrètes grâce à l'IA.</p>
                                <button onClick={nextStep} class="w-full py-4 rounded-2xl font-bold text-[16px] bg-[#E34400] text-white hover:brightness-110 transition-all">
                                    C'est parti
                                </button>
                            </div>
                        )}

                        {step === 2 && (
                            <div class="animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <h2 class="text-2xl font-bold tracking-tight mb-4">Centralisez vos flux</h2>
                                <p class="text-gray-500 leading-relaxed mb-8">Connectez Slack, WhatsApp et vos emails pour ne plus jamais rater une demande client.</p>
                                <div class="grid grid-cols-4 gap-4 mb-10">
                                    {['logos/slack.png', 'logos/whatsapp.png', 'logos/gmail.png', 'logos/discord.png'].map(src => (
                                        <div key={src} class="aspect-square rounded-xl bg-gray-50 flex items-center justify-center p-3 border border-gray-100">
                                            <img src={src} class="w-full h-full object-contain grayscale opacity-50" />
                                        </div>
                                    ))}
                                </div>
                                <button onClick={nextStep} class="w-full py-4 rounded-2xl font-bold text-[16px] bg-[#E34400] text-white hover:brightness-110 transition-all">
                                    Continuer
                                </button>
                            </div>
                        )}

                        {step === 3 && (
                            <div class="animate-in fade-in slide-in-from-bottom-4 duration-500 text-center">
                                <div class="w-20 h-20 bg-green-50 text-green-500 rounded-full flex items-center justify-center text-3xl mx-auto mb-6">✓</div>
                                <h2 class="text-2xl font-bold tracking-tight mb-4">Tout est prêt !</h2>
                                <p class="text-gray-500 leading-relaxed mb-10">Votre boîte de réception intelligente est configurée. L'IA est prête à extraire vos premières tâches.</p>
                                <button onClick={() => window.location.href='/dashboard.html'} class="w-full py-4 rounded-2xl font-bold text-[16px] bg-black text-white hover:bg-gray-800 transition-all">
                                    Accéder au Dashboard
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Onboarding />);
    </script>
</body>
</html>
